<html>
<head>
    <title>Advanced Restaurant Website</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <header>
        <h1>Welcome to Our Advanced Restaurant</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Menu</a></li>
                <li><a href="#">Reviews</a></li>
                <li><a href="#">Bookings</a></li>
                <li><a href="#">Login</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="authentication">
            <h2>User Authentication</h2>
            <form id="loginForm">
                <input type="text" placeholder="Username" required>
                <input type="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <form id="registerForm">
                <input type="text" placeholder="New Username" required>
                <input type="password" placeholder="New Password" required>
                <button type="submit">Register</button>
            </form>
        </section>
        <section id="menu">
            <h2>Our Menu</h2>
            <div id="foodItems">
                <!-- Food items will be dynamically added here -->
            </div>
            <input type="text" id="searchBar" placeholder="Search for food...">
        </section>
        <section id="shoppingCart">
            <h2>Your Shopping Cart</h2>
            <div id="cartItems">
                <!-- Cart items will be displayed here -->
            </div>
            <button id="checkout">Checkout</button>
        </section>
        <section id="reviews">
            <h2>Customer Reviews</h2>
            <div id="reviewList">
                <!-- Reviews will be listed here -->
            </div>
        </section>
        <section id="bookingManagement">
            <h2>Booking Management</h2>
            <form id="bookingForm">
                <input type="text" placeholder="Booking Name" required>
                <input type="date" required>
                <input type="time" required>
                <button type="submit">Book a Table</button>
            </form>
        </section>
    </main>
    <footer>
        <button id="toggleDarkMode">Toggle Dark Mode</button>
    </footer>
</body>
</html>
